<!-- ==========================================================================
     BMCCI UI MODULE - GLOBAL LOADER OVERLAY
     ========================================================================== -->
<div id="global-loader" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-[9999] transition-opacity duration-700 ease-out">
  <div class="flex flex-col items-center gap-6">
    <!-- Animated Logo Mark -->
    <div class="flex items-center justify-center animate-pulse">
      <img src="https://bmcci.org.bd/public/images/logo.png" alt="BMCCI Logo" class="h-16 w-auto object-contain" />
    </div>
    <!-- Loading spinner line -->
    <div class="w-32 h-1 bg-neutral-border rounded-full overflow-hidden relative mt-2">
      <div class="absolute top-0 left-0 h-full w-12 bg-brand-green rounded-full animate-[loadingLine_1s_infinite_ease-in-out]"></div>
    </div>
  </div>
</div>

<style>
@keyframes loadingLine {
  0% { left: -50%; }
  100% { left: 100%; }
}
</style>
