<!-- ==========================================================================
     BMCCI UI STATE - ERROR STATE PLACEHOLDER
     ========================================================================== -->
<div class="w-full py-12 flex flex-col items-center justify-center text-center px-4" id="error-state-template">
  <div class="w-16 h-16 rounded-full bg-brand-red/10 border border-brand-red/20 flex items-center justify-center text-brand-red mb-4">
    <i data-lucide="alert-circle" class="w-8 h-8"></i>
  </div>
  <h3 class="text-text-dark font-bold text-lg mb-2">Connection Exception</h3>
  <p class="text-text-body text-sm max-w-sm leading-relaxed mb-6">
    We encountered a problem loading data from our servers. Please verify your connection and try again.
  </p>
  <button class="px-6 py-2.5 border border-brand-green text-brand-green hover:bg-brand-green hover:text-white font-bold text-xs rounded-btn transition-fast" onclick="window.location.reload();">
    Retry Load
  </button>
</div>
