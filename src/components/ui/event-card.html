<!-- ==========================================================================
     BMCCI UI MODULE - EVENT CARD
     ========================================================================== -->
<div class="bg-white border border-neutral-border rounded-md shadow-card hover-lift overflow-hidden flex flex-col justify-between group">
  
  <!-- Image Container with zoom shift -->
  <div class="relative w-full aspect-video overflow-hidden shrink-0">
    <img src="/assets/images/events/showcase-default.jpg" alt="Bilateral Summit Scene" 
         class="w-full h-full object-cover transition-premium duration-[1s] group-hover:scale-105" loading="lazy" />
    <span class="absolute top-4 left-4 inline-flex px-3 py-1 bg-brand-green text-white text-[10px] font-bold uppercase rounded-full shadow-card">
      Trade Summit
    </span>
  </div>

  <!-- Body Content -->
  <div class="p-6 flex flex-col gap-4 flex-1 justify-between">
    <div class="flex flex-col gap-2.5">
      <!-- Date & Category row -->
      <div class="flex items-center gap-2 text-xs font-semibold text-brand-green">
        <i data-lucide="calendar" class="w-4 h-4 text-brand-green shrink-0"></i>
        <span>September 14-16, 2026</span>
      </div>
      
      <h3 class="text-text-dark font-extrabold text-base leading-snug group-hover:text-brand-green transition-fast">
        Malaysia-Bangladesh Trade Showcase 2026
      </h3>
      
      <p class="text-text-body text-xs leading-relaxed line-clamp-2">
        The landmark annual trade expo hosting over 150 exhibitors displaying tech, machinery, and commodities from both nations.
      </p>
    </div>

    <!-- Metadata Details & Button -->
    <div class="flex flex-col gap-4 border-t border-neutral-border pt-4 mt-2">
      <div class="flex flex-col gap-2 text-xs text-text-body">
        <span class="flex items-center gap-2">
          <i data-lucide="map-pin" class="w-4 h-4 text-text-muted shrink-0"></i>
          <span class="truncate">Pan Pacific Sonargaon, Dhaka</span>
        </span>
        <span class="flex items-center gap-2">
          <i data-lucide="clock" class="w-4 h-4 text-text-muted shrink-0"></i>
          <span>09:00 AM - 05:30 PM (Daily)</span>
        </span>
      </div>

      <a href="/pages/events.html#register" class="w-full text-center py-2.5 bg-brand-green hover:bg-brand-darkGreen text-white font-bold text-xs rounded-btn shadow-card transition-fast flex items-center justify-center gap-1.5 mt-1">
        <span>Register Seat</span>
        <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
      </a>
    </div>
  </div>

</div>
