<!-- ==========================================================================
     BMCCI UI MODULE - SEARCH BAR WITH FILTER INTEGRATIONS
     ========================================================================== -->
<div class="bg-white border border-neutral-border rounded-lg shadow-card p-4 flex flex-col md:flex-row items-center gap-4 w-full" id="reusable-search-bar">
  
  <!-- Search Icon & Text Input -->
  <div class="flex items-center gap-3 flex-1 w-full pl-2">
    <i data-lucide="search" class="w-5 h-5 text-brand-green shrink-0"></i>
    <input type="text" placeholder="Search members, cargo agencies, duty codes..." 
           class="w-full text-sm text-text-dark outline-none bg-transparent" id="search-bar-input" />
  </div>

  <!-- Divider line on desktop, hidden on mobile -->
  <div class="h-6 w-px bg-neutral-border hidden md:block"></div>

  <!-- Quick Selector triggers & Actions -->
  <div class="flex items-center gap-3 w-full md:w-auto shrink-0">
    <!-- Filter Dialog Trigger button -->
    <button class="inline-flex items-center justify-center gap-2 h-11 px-4 border border-neutral-border rounded-btn text-xs font-semibold text-text-body hover:border-brand-green hover:text-brand-green transition-fast bg-white w-full sm:w-auto" 
            data-dropdown-trigger>
      <i data-lucide="users" class="w-3.5 h-3.5"></i>
      <span>All Divisions</span>
      <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
    </button>

    <!-- Search Execution button -->
    <button class="h-11 px-6 bg-brand-green hover:bg-brand-darkGreen text-white font-bold text-xs rounded-btn shadow-card transition-fast w-full sm:w-auto">
      Search
    </button>
  </div>

</div>
