<!-- ==========================================================================
     BMCCI UI MODULE - BUTTONS CATALOG
     ========================================================================== -->

<!-- Primary Button -->
<button class="inline-flex items-center justify-center h-[52px] px-7 py-3 bg-brand-green hover:bg-brand-darkGreen text-white font-semibold text-sm rounded-btn shadow-card transition-fast gap-2">
  <span>Primary Action</span>
  <i data-lucide="arrow-right" class="w-4 h-4"></i>
</button>

<!-- Secondary Button -->
<button class="inline-flex items-center justify-center h-[52px] px-7 py-3 border border-brand-green bg-transparent hover:bg-brand-green/5 text-brand-green font-semibold text-sm rounded-btn transition-fast gap-2">
  <span>Secondary Action</span>
  <i data-lucide="chevron-right" class="w-4 h-4"></i>
</button>

<!-- Outline / Muted Button -->
<button class="inline-flex items-center justify-center h-[52px] px-7 py-3 border border-neutral-border bg-white hover:bg-neutral-bgSecondary text-text-dark font-semibold text-sm rounded-btn shadow-card transition-fast gap-2">
  <span>Outline Action</span>
</button>

<!-- Ghost Button (Plain) -->
<button class="inline-flex items-center justify-center px-4 py-2 text-text-body hover:text-brand-green hover:underline hover:underline-offset-4 text-sm font-semibold transition-fast">
  <span>Ghost Action</span>
</button>
