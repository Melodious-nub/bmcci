<div class="flex items-center justify-center gap-2 py-8" id="demo-pagination">
  <!-- Prev Button -->
  <button class="inline-flex items-center justify-center w-10 h-10 border border-neutral-border bg-white rounded-btn hover:border-brand-green hover:text-brand-green text-text-muted transition-fast">
    <i data-lucide="chevron-right" class="w-4 h-4 rotate-180"></i>
  </button>

  <button class="w-10 h-10 bg-brand-green text-white font-bold text-sm rounded-btn shadow-card">

  </button>
  <button class="w-10 h-10 border border-neutral-border bg-white text-text-body hover:border-brand-green hover:text-brand-green font-bold text-sm rounded-btn transition-fast">
    2
  </button>
  <button class="w-10 h-10 border border-neutral-border bg-white text-text-body hover:border-brand-green hover:text-brand-green font-bold text-sm rounded-btn transition-fast">
    3
  </button>
  
  <!-- Next Button -->
  <button class="inline-flex items-center justify-center w-10 h-10 border border-neutral-border bg-white rounded-btn hover:border-brand-green hover:text-brand-green text-text-muted transition-fast">
    <i data-lucide="chevron-right" class="w-4 h-4"></i>
  </button>
</div>
