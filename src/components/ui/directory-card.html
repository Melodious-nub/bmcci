<!-- ==========================================================================
     BMCCI UI MODULE - DIRECTORY MEMBER CARD
     ========================================================================== -->
<div class="bg-white border border-neutral-border rounded-md shadow-card hover-lift p-6 flex flex-col gap-5 justify-between relative overflow-hidden group">
  <!-- Top Section (Branding & Origin) -->
  <div class="flex flex-col gap-3.5">
    <div class="flex items-start justify-between gap-4">
      <!-- Company Logo Placeholder -->
      <div class="w-12 h-12 rounded border border-neutral-border bg-neutral-bgSecondary flex items-center justify-center text-text-dark font-extrabold text-sm tracking-wider shrink-0 uppercase">
        AX
      </div>
      <!-- Country Origin Badge -->
      <span class="inline-flex items-center px-2.5 py-0.5 bg-brand-green/10 text-brand-green text-[10px] font-bold rounded-full border border-brand-green/15">
        Bangladesh
      </span>
    </div>
    
    <div class="flex flex-col gap-1">
      <span class="text-[10px] font-bold text-brand-blue uppercase tracking-widest">Logistics & Cargo</span>
      <h3 class="text-text-dark font-extrabold text-base leading-tight group-hover:text-brand-green transition-fast">
        Apex Cargo & Logistics Ltd.
      </h3>
    </div>
    
    <p class="text-text-body text-xs leading-relaxed line-clamp-3">
      Premier clearing agency and logistics provider specializing in container shipping cargo solutions connecting Chittagong seaport with Port Klang channels.
    </p>
  </div>

  <!-- Bottom Metadata & Profile Action -->
  <div class="flex items-center justify-between border-t border-neutral-border pt-4 mt-2">
    <span class="text-[10px] text-text-muted font-medium uppercase tracking-wider">Member Since 2012</span>
    <button class="text-xs text-brand-green font-bold flex items-center gap-1 hover:underline group/dir-cta" data-modal-open="member-detail-modal">
      <span>View Profile</span>
      <i data-lucide="arrow-right" class="w-3.5 h-3.5 transition-transform group-hover/dir-cta:translate-x-0.5"></i>
    </button>
  </div>
</div>
