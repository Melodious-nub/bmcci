     BMCCI UI MODULE - MODALS
     ========================================================================== -->
<div id="demo-modal-wrapper" class="modal-backdrop fixed inset-0 z-50 bg-text-dark/40 backdrop-blur-sm hidden items-center justify-center p-4">
  <div class="bg-white rounded-md shadow-floating w-full max-w-lg overflow-hidden transform scale-95 transition-normal border border-neutral-border">
    
    <!-- Modal Header -->
    <div class="p-6 border-b border-neutral-border flex items-center justify-between">
      <h3 class="text-text-dark font-bold text-lg">Modal Panel Title</h3>
      <button class="p-1.5 hover:bg-neutral-bgSecondary rounded-full text-text-muted hover:text-text-dark transition-fast" data-modal-close>
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
    
    <!-- Modal Body -->
    <div class="p-6 text-sm text-text-body leading-relaxed">
      This is a standardized modal structure containing dialog items, membership detail briefs, or summit registration confirmation guides.
    </div>
    
    <!-- Modal Footer Actions -->
    <div class="p-6 border-t border-neutral-border bg-neutral-bgSecondary flex items-center justify-end gap-3">
      <button class="px-5 py-2.5 border border-neutral-border text-text-body font-semibold text-xs rounded-btn bg-white hover:bg-neutral-bgSecondary transition-fast" data-modal-close>
        Cancel
      </button>
      <button class="px-5 py-2.5 bg-brand-green hover:bg-brand-darkGreen text-white font-semibold text-xs rounded-btn shadow-card transition-fast">
        Submit Request
      </button>
    </div>

  </div>
</div>
