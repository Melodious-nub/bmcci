<!-- ==========================================================================
     BMCCI UI MODULE - MAP & LOCATION SECTION
     ========================================================================== -->
<div class="border border-neutral-border rounded-lg bg-white overflow-hidden w-full shadow-card grid grid-cols-1 lg:grid-cols-12" id="reusable-map-section animate-reveal">
  
  <!-- Left Side: Interactive Map Placeholder (Span 7) -->
  <div class="lg:col-span-7 h-[350px] lg:h-[450px] relative bg-neutral-bgSecondary flex items-center justify-center overflow-hidden">
    <!-- Map placeholder visuals (subtle grid/sat backing) -->
    <div class="absolute inset-0 opacity-[0.25] bg-[radial-gradient(#0033a0_1.5px,transparent_1.5px)] [background-size:24px_24px]"></div>
    
    <!-- Styled centered pin marker -->
    <div class="flex flex-col items-center gap-2 relative z-10">
      <div class="w-12 h-12 rounded-full bg-brand-green flex items-center justify-center text-white shadow-floating relative">
        <i data-lucide="map-pin" class="w-6 h-6 animate-bounce"></i>
        <!-- Ping outer pulse -->
        <span class="absolute inline-flex h-full w-full rounded-full bg-brand-green opacity-40 animate-ping"></span>
      </div>
      <span class="px-3 py-1.5 bg-text-dark text-white text-[10px] font-bold uppercase rounded shadow-card leading-none border border-slate-800">BMCCI Secretariat</span>
    </div>

    <!-- Map Controls overlay panel -->
    <div class="absolute bottom-4 left-4 glass-panel rounded p-2 flex gap-1.5 shadow-card z-10 text-[10px] font-semibold text-text-body">
      <button class="px-2.5 py-1 bg-white hover:bg-neutral-bgSecondary border border-neutral-border rounded shadow-sm">Zoom In</button>
      <button class="px-2.5 py-1 bg-white hover:bg-neutral-bgSecondary border border-neutral-border rounded shadow-sm">Zoom Out</button>
    </div>
  </div>

  <!-- Right Side: Details Address Card (Span 5) -->
  <div class="lg:col-span-5 p-8 flex flex-col justify-between gap-8 border-t lg:border-t-0 lg:border-l border-neutral-border text-left">
    
    <div class="flex flex-col gap-6">
      <div class="flex flex-col gap-1.5">
        <span class="text-[10px] font-bold text-brand-green uppercase tracking-wider">Secretariat Headquarters</span>
        <h3 class="text-text-dark font-extrabold text-xl tracking-tight">Visit Our Office</h3>
      </div>
      
      <!-- Detailed Address listings -->
      <div class="flex flex-col gap-4 text-xs text-text-body font-medium">
        <div class="flex gap-3">
          <i data-lucide="map-pin" class="w-4 h-4 text-brand-green shrink-0 mt-0.5"></i>
          <div class="flex flex-col gap-0.5">
            <span class="text-text-dark font-bold">Chamber Secretariat Office</span>
            <span>House-22, Road-4, Block-F, Banani, Dhaka-1213, Bangladesh</span>
          </div>
        </div>
        
        <div class="flex gap-3">
          <i data-lucide="mail" class="w-4 h-4 text-brand-blue shrink-0"></i>
          <div class="flex flex-col gap-0.5">
            <span class="text-text-dark font-bold">Electronic Contacts</span>
            <a href="mailto:info@bmcci.org.bd" class="hover:text-brand-green">info@bmcci.org.bd</a>
            <a href="mailto:secretary@bmcci.org.bd" class="hover:text-brand-green">secretary@bmcci.org.bd</a>
          </div>
        </div>

        <div class="flex gap-3">
          <i data-lucide="phone" class="w-4 h-4 text-brand-gold shrink-0"></i>
          <div class="flex flex-col gap-0.5">
            <span class="text-text-dark font-bold">Telephone Queries</span>
            <a href="tel:+8802222283921" class="hover:text-brand-green">+880-222-228-3921</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Action Link out -->
    <a href="https://maps.google.com" target="_blank" rel="noopener" 
       class="w-full py-3 bg-neutral-bgSecondary hover:bg-neutral-border text-text-dark font-bold text-xs rounded-btn border border-neutral-border shadow-card transition-fast flex items-center justify-center gap-2">
      <i data-lucide="external-link" class="w-4 h-4 text-brand-blue"></i>
      <span>Open Directions in Google Maps</span>
    </a>

  </div>

</div>
