<!-- ==========================================================================
     BMCCI UI MODULE - TOAST NOTIFICATIONS (POPUP FEEDBACK)
     ========================================================================== -->
<div class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3 max-w-sm pointer-events-none" id="global-toast-container">
  
  <!-- Success Toast -->
  <div class="bg-white rounded-md border border-neutral-border shadow-floating p-4 flex gap-3.5 items-start pointer-events-auto transform translate-y-0 opacity-100 transition-premium duration-500 max-w-xs select-none">
    <div class="w-8 h-8 rounded-full bg-brand-green/10 flex items-center justify-center text-brand-green shrink-0">
      <i data-lucide="check" class="w-4 h-4"></i>
    </div>
    <div class="flex flex-col gap-1 text-left">
      <span class="text-xs font-bold text-text-dark">Success</span>
      <span class="text-[11px] text-text-body leading-normal">Your membership application has been saved successfully.</span>
    </div>
  </div>

  <!-- Warning Toast (hidden/opacity-0 state example) -->
  <div class="bg-white rounded-md border border-neutral-border shadow-floating p-4 flex gap-3.5 items-start pointer-events-auto opacity-0 translate-y-4 scale-95 pointer-events-none transition-premium duration-500 max-w-xs select-none hidden">
    <div class="w-8 h-8 rounded-full bg-brand-gold/10 flex items-center justify-center text-brand-gold shrink-0">
      <i data-lucide="info" class="w-4 h-4"></i>
    </div>
    <div class="flex flex-col gap-1 text-left">
      <span class="text-xs font-bold text-text-dark">Warning</span>
      <span class="text-[11px] text-text-body leading-normal">Please verify your corporate license file format.</span>
    </div>
  </div>

  <!-- Error Toast (hidden/opacity-0 state example) -->
  <div class="bg-white rounded-md border border-neutral-border shadow-floating p-4 flex gap-3.5 items-start pointer-events-auto opacity-0 translate-y-4 scale-95 pointer-events-none transition-premium duration-500 max-w-xs select-none hidden">
    <div class="w-8 h-8 rounded-full bg-brand-red/10 flex items-center justify-center text-brand-red shrink-0">
      <i data-lucide="alert-circle" class="w-4 h-4"></i>
    </div>
    <div class="flex flex-col gap-1 text-left">
      <span class="text-xs font-bold text-text-dark">Connection Fault</span>
      <span class="text-[11px] text-text-body leading-normal">Unable to reach secretariat servers. Please try again.</span>
    </div>
  </div>

</div>
